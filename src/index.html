<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Kaliwat</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- connect-src allows https so GEDCOM-referenced photos can be fetched once and
       cached locally; images still render only from blob:/data: (img-src), never a
       remote <img>. See MediaService.avatar (fetch-once-then-local). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https:; img-src 'self' blob: data:; font-src 'self'; object-src 'none'; base-uri 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2b2420">
</head>
<body>
  <app-root></app-root>
</body>
</html>
